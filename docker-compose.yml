services:
  db:
    image: postgres:15
    container_name: jumia_db
    restart: no
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: products_pipeline
    ports:
      - "5432:5432"          # Optional: remove if you don't need external access
    volumes:
      - postgres_data:/var/lib/postgresql/data   # Persist database
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d products_pipeline"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  app:
    build: .
    container_name: jumia_scraper
    depends_on:
      db:
        condition: service_healthy      # Wait until DB is ready, not just started
    environment:
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_HOST=db   # Note: Within Docker, the host is the name of the service 'db'
    restart: unless-stopped   # Good practice for app containers

volumes:
  postgres_data:    # Named volume for database persistence